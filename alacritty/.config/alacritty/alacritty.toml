[general]
import = ["./alacritty-theme/themes/gruvbox_dark.toml"]

[window]
opacity = 1.0
startup_mode = "Windowed"
dimensions = { columns = 100, lines = 30 }

[selection]
save_to_clipboard = true



[scrolling]
history = 1000
multiplier = 5

[font]
size = 16

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "Off" }


[keyboard]
bindings = [
  { key = "Return", mods = "Super", action = "SpawnNewInstance" }
]
